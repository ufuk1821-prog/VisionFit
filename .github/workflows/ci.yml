name: VisionFit FastAPI CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Kaynak Kodlari Cek
      uses: actions/checkout@v3

    - name: Python 3.11 Kur
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Bağımlılıkları Yukle
      run: |
        python -m pip install --upgrade pip
        pip install fastapi "uvicorn[standard]" sqlalchemy psycopg2-binary python-dotenv bcrypt python-jose "pydantic[email]" pytest pytest-cov httpx

    - name: Testleri ve Coverage Raporunu Calistir
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
        pytest -v --cov=backend/main --cov=backend/models --cov=backend/schemas --cov=backend/database