name: Python CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v3

    - name: Python 3.11 Kur
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Gereksinimleri Yukle
      run: |
        python -m pip install --upgrade pip
        pip install fastapi "uvicorn[standard]" sqlalchemy psycopg2-binary python-dotenv passlib bcrypt python-jose "pydantic[email]" pytest pytest-cov httpx

    - name: Testleri ve Coverage Raporunu Calistir
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
      run: |
        pytest -v --cov=main --cov=models --cov=schemas --cov=database